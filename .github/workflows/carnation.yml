name: Carnation Weekly Report

on:
  schedule:
    # Monday 9 AM AEST = Sunday 10 PM UTC
    # Cron format: minute hour day month weekday
    - cron: '0 22 * * 0'  # Sunday 10 PM UTC = Monday 9 AM AEST
  
  # Also allow manual trigger if needed
  workflow_dispatch:

jobs:
  carnation:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install anthropic requests
      
      - name: Run Carnation
        run: python3 carnation.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      
      - name: Commit and push results
        run: |
          git config user.name "Carnation Bot"
          git config user.email "carnation@pontil.io"
          git add competitor_snapshots/
          git commit -m "Carnation weekly report - $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push
        continue-on-error: true
